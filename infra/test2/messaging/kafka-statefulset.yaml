apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: default
  labels:
    app: kafka
    managed-by: endfield
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: main
        env:
          - name: KAFKA_BROKER_ID
            valueFrom:
              configMapKeyRef:
                name: kafka-config
                key: KAFKA_BROKER_ID
          - name: KAFKA_ZOOKEEPER_CONNECT
            valueFrom:
              configMapKeyRef:
                name: kafka-config
                key: KAFKA_ZOOKEEPER_CONNECT
          - name: KAFKA_ADVERTISED_LISTENERS
            valueFrom:
              configMapKeyRef:
                name: kafka-config
                key: KAFKA_ADVERTISED_LISTENERS
          - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
            valueFrom:
              configMapKeyRef:
                name: kafka-config
                key: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
            valueFrom:
              configMapKeyRef:
                name: kafka-config
                key: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

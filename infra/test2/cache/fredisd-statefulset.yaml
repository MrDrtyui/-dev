apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fredisd
  namespace: default
  labels:
    app: fredisd
    managed-by: endfield
spec:
  serviceName: fredisd
  replicas: 1
  selector:
    matchLabels:
      app: fredisd
  template:
    metadata:
      labels:
        app: fredisd
    spec:
      containers:
        - name: fredisd
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: main
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumeMounts:
        - name: data
          mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

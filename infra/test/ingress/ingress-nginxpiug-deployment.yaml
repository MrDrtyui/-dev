apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-nginxpiug
  namespace: default
  labels:
    app: ingress-nginxpiug
    managed-by: endfield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-nginxpiug
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ingress-nginxpiug
    spec:
      containers:
        - name: ingress-nginxpiug
          image: registry.k8s.io/ingress-nginx/controller:v1.9.6
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

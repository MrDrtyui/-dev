apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheusasdfasdf
  namespace: default
  labels:
    app: prometheusasdfasdf
    managed-by: endfield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheusasdfasdf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: prometheusasdfasdf
    spec:
      containers:
        - name: prometheusasdfasdf
          image: prom/prometheus:v2.49.1
          ports:
            - containerPort: 9090
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 4
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

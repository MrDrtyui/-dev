apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-kj-kh-kh
  namespace: default
  labels:
    app: grafana-kj-kh-kh
    managed-by: endfield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-kj-kh-kh
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: grafana-kj-kh-kh
    spec:
      containers:
        - name: grafana-kj-kh-kh
          image: grafana/grafana:10.3.1
          ports:
            - containerPort: 3000
        env:
          - name: GF_SECURITY_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-kj-kh-kh-secret
                key: GF_SECURITY_ADMIN_PASSWORD
          - name: GF_USERS_ALLOW_SIGN_UP
            value: "false"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpandalkhj
  namespace: default
  labels:
    app: redpandalkhj
    managed-by: endfield
spec:
  serviceName: redpandalkhj-headless
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redpandalkhj
  template:
    metadata:
      labels:
        app: redpandalkhj
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: redpandalkhj
          image: redpandadata/redpanda:v23.3.11
          ports:
            - containerPort: 9092
              name: main
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

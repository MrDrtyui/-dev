apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafkajlh
  namespace: default
  labels:
    app: kafkajlh
    managed-by: endfield
spec:
  serviceName: kafkajlh-headless
  replicas: 3
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: kafkajlh
  template:
    metadata:
      labels:
        app: kafkajlh
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 999
      containers:
        - name: kafkajlh
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: main
        env:
          - name: KAFKA_ZOOKEEPER_CONNECT
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_ZOOKEEPER_CONNECT
          - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          - name: KAFKA_INTER_BROKER_LISTENER_NAME
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_INTER_BROKER_LISTENER_NAME
          - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          - name: KAFKA_DEFAULT_REPLICATION_FACTOR
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_DEFAULT_REPLICATION_FACTOR
          - name: KAFKA_MIN_INSYNC_REPLICAS
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_MIN_INSYNC_REPLICAS
          - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
            valueFrom:
              configMapKeyRef:
                name: kafkajlh-config
                key: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: customasdfasdf
  namespace: default
  labels:
    app: customasdfasdf
    managed-by: endfield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customasdfasdf
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: customasdfasdf
    spec:
      containers:
        - name: customasdfasdf
          image: 
          ports:
            - containerPort: 8080
        env:
          - name: PORT
            value: "8080"
          - name: NODE_ENV
            value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

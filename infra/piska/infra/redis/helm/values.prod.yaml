# Production overrides — edit this file for prod deployments
redis:
  architecture: replication

  auth:
    enabled: true
    password: "CHANGE_ME"

  master:
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

  replica:
    replicaCount: 2
    persistence:
      size: 10Gi

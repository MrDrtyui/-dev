# Source: prometheussd/charts/kube-prometheus-stack/templates/prometheus/prometheus.yaml
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: prometheussd-kube-promethe-prometheus
  namespace: infra-monitoring
  labels:
    app: kube-prometheus-stack-prometheus
    
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: prometheussd
    app.kubernetes.io/version: "58.2.2"
    app.kubernetes.io/part-of: kube-prometheus-stack
    chart: kube-prometheus-stack-58.2.2
    release: "prometheussd"
    heritage: "Helm"
spec:
  image: "quay.io/prometheus/prometheus:v2.51.2"
  version: v2.51.2
  externalUrl: http://prometheussd-kube-promethe-prometheus.infra-monitoring:9090
  paused: false
  replicas: 1
  shards: 1
  logLevel:  info
  logFormat:  logfmt
  listenLocal: false
  enableAdminAPI: false
  retention: "15d"
  tsdb:
    outOfOrderTimeWindow: 0s
  walCompression: true
  routePrefix: "/"
  serviceAccountName: prometheussd-kube-promethe-prometheus
  serviceMonitorSelector:
    matchLabels:
      release: "prometheussd"

  serviceMonitorNamespaceSelector: {}
  podMonitorSelector:
    matchLabels:
      release: "prometheussd"

  podMonitorNamespaceSelector: {}
  probeSelector:
    matchLabels:
      release: "prometheussd"

  probeNamespaceSelector: {}
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  ruleNamespaceSelector: {}
  ruleSelector:
    matchLabels:
      release: "prometheussd"

  scrapeConfigSelector:
    matchLabels:
      release: "prometheussd"

  scrapeConfigNamespaceSelector: {}
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  portName: http-web
  hostNetwork: false

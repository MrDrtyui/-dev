# Source: prometheussd/charts/kube-prometheus-stack/charts/grafana/templates/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheussd-grafana
  namespace: infra-monitoring
  labels:
    helm.sh/chart: grafana-7.3.9
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: prometheussd
    app.kubernetes.io/version: "10.4.1"
    app.kubernetes.io/managed-by: Helm
spec:
  endpoints:
  - port: http-web
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics
    scheme: http
  jobLabel: "prometheussd"
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: prometheussd
  namespaceSelector:
    matchNames:
      - infra-monitoring

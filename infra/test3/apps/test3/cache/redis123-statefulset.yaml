apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis123
  namespace: test3
  labels:
    app: redis123
    managed-by: endfield
spec:
  serviceName: redis123-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis123
  template:
    metadata:
      labels:
        app: redis123
    spec:
      containers:
        - name: redis123
          image: redis:7-alpine
          ports:
            - containerPort: 6379
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx32432
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx32432
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx32432
    spec:
      containers:
        - name: nginx32432
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

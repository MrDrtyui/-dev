apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-11111
  namespace: default
spec:
  serviceName: redis-11111-headless
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: redis-11111
  template:
    metadata:
      labels:
        app: redis-11111
    spec:
      containers:
        - name: redis-11111
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi

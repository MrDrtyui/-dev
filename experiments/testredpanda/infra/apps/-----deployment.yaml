apiVersion: apps/v1
kind: Deployment
metadata:
  name: ----
  namespace: default
  labels:
    app: ----
    managed-by: endfield
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ----
  template:
    metadata:
      labels:
        app: ----
    spec:
      containers:
        - name: ----
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
